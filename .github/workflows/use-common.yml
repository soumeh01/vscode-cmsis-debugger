name: CI

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/use-common.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/use-common.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write
    uses: soumeh01/test_ts_app/.github/workflows/build-and-verify.yml@itr5
    with:
      build-matrix: '[{"platform":"windows-2022","arch":"amd64"},{"platform":"ubuntu-24.04","arch":"amd64"},{"platform":"macOS-14","arch":"arm64"}]'
      test-matrix: '[{"platform":"windows-2022","arch":"amd64"},{"platform":"ubuntu-24.04","arch":"amd64"},{"platform":"macOS-14","arch":"arm64"}]'
      package-manager: yarn
      node-version-file: 'package.json'
      build-command: 'build:no-lint'
      test-command: 'test'
      lint-command: 'lint'

  tpip-report:
    uses: soumeh01/test_ts_app/.github/workflows/tpip.yml@itr5
    with:
      package-manager: yarn
      node-version-file: 'package.json'
      tpip-header-file: 'docs/tpip-header.md'
      tpip-json-file: 'docs/third-party-licenses.json'

